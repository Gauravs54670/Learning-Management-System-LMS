spring.application.name=LMS3
#configuring database
spring.datasource.url = jdbc:mysql://localhost:3306/learningmanagementsystem3
spring.datasource.username = root
spring.datasource.password = root
#Jpa and Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Switch to 'prod' when deploying
spring.profiles.active=dev
#Logging
logging.level.org.springframework = INFO

#email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.tomcat.max-swallow-size=500MB
server.tomcat.max-http-form-post-size=500MB

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html